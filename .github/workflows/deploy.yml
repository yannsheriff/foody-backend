name: Deploy to Vercel (production)

# Real auto-deploy: every push to main builds and ships to production via the
# Vercel CLI. Requires three repo secrets — VERCEL_ORG_ID and VERCEL_PROJECT_ID
# (already set), and VERCEL_TOKEN (create at vercel.com/account/tokens, then:
#   gh secret set VERCEL_TOKEN --repo yannsheriff/foody-backend --body <token>)

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install Vercel CLI
        run: npm install --global vercel@latest
      - name: Pull Vercel project settings
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
      - name: Build
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
      - name: Deploy prebuilt output to production
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
