name: Deploy to Vercel (production)

# Real auto-deploy: every push to main ships to production via the Vercel CLI.
# IMPORTANT: this backend deploys with Vercel's REMOTE builder (plain
# `vercel deploy --prod`), NOT `vercel build` + `--prebuilt`. The serverless
# entrypoint (src/main.ts default export on @vercel/node) is not reproduced
# correctly by a local prebuilt output — a prebuilt deploy returns 404
# NOT_FOUND on every route. Keep the remote build. (cf. CLAUDE.md main.ts note.)
#
# Requires repo secrets VERCEL_ORG_ID, VERCEL_PROJECT_ID and VERCEL_TOKEN
# (create the token at vercel.com/account/tokens).

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install Vercel CLI
        run: npm install --global vercel@latest
      - name: Deploy to production (remote build)
        run: vercel deploy --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
